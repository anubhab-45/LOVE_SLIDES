<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Love Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
width:95%;
max-width:420px;
height:90vh;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
position:relative;
}

.slide{
display:none;
width:100%;
height:100%;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
animation:fade 0.7s;
}

.slide.active{
display:flex;
}

img{
width:90%;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
margin-bottom:15px;
transition:0.3s;
}

img:hover{
transform:scale(1.05);
}

h1{
color:#ff3e6c;
margin-bottom:10px;
}

p{
font-size:17px;
color:#444;
}

.buttons{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

button{
border:none;
padding:10px 20px;
background:#ff4d6d;
color:white;
border-radius:25px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#e6004c;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<div class="slide active">
<h1>Happy Valentine's Day ❤️</h1>
<p>আমার সোনা, আমার পৃথিবী।  
এই ছবিগুলো শুধু স্মৃতি না —  
আমাদের গল্প।</p>
</div>

<div class="slide">
<img src="A symbol of love.jpg">
<p>তুমি আমার ভালোবাসার প্রতীক।</p>
</div>

<div class="slide">
<img src="Gemini.jpg">
<p>তোমার হাসি আমার শক্তি।</p>
</div>

<div class="slide">
<img src="Goofy uss.jpg">
<p>আমাদের পাগলামিই সবচেয়ে সুন্দর।</p>
</div>

<div class="slide">
<img src="MADO.jpg">
<p>তুমি পাশে থাকলেই সব সহজ।</p>
</div>

<div class="slide">
<img src="RIT.jpg">
<p>ভিড়ের মধ্যেও তোমাকেই খুঁজি।</p>
</div>

<div class="slide">
<img src="Saraswati pujo.jpg">
<p>এই মুহূর্তগুলো চিরদিন থাকবে।</p>
</div>

<div class="slide">
<img src="sona.jpg">
<p>তুমি আমার সোনা।</p>
</div>

<div class="slide">
<img src="uss.jpg">
<p>আমরা — সবসময় একসাথে।</p>
</div>

<div class="buttons">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

</div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlide(i){

slides.forEach(s=>s.classList.remove("active"));
slides[i].classList.add("active");

}

function next(){

if(index<slides.length-1){
index++;
showSlide(index);
}

}

function prev(){

if(index>0){
index--;
showSlide(index);
}

}

</script>

</body>
</html>
